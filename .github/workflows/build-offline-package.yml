name: Build LIG OpenCode offline package

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - codex/**
    paths:
      - .github/workflows/build-offline-package.yml
      - patches/**
      - workspace-template/**
      - docs/**
      - AGENTS.md
      - README.md
  pull_request:
    paths:
      - .github/workflows/build-offline-package.yml
      - patches/**
      - workspace-template/**
      - docs/**
      - AGENTS.md
      - README.md

permissions:
  contents: read
  actions: read

jobs:
  build-offline-package:
    name: Build Windows offline package
    runs-on: windows-latest
    timeout-minutes: 90

    env:
      OPENCODE_REPO: https://github.com/anomalyco/opencode.git
      OPENCODE_COMMIT: afff74eb2c9fc3808a9795f365707f32853099e9
      PATCH_FILE: ${{ github.workspace }}\patches\opencode-permission-mode-toggle.patch
      PACKAGE_NAME: LIG_OPENCODE_PATCHED_OFFLINE_PACKAGE

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Show tool versions
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true
          git --version
          bun --version
          node --version

      - name: Clone upstream OpenCode at pinned commit
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true
          git clone --no-checkout "$env:OPENCODE_REPO" opencode-source
          Set-Location opencode-source
          git checkout "$env:OPENCODE_COMMIT"
          git rev-parse HEAD

      - name: Apply permission approval controller patch
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true
          Set-Location opencode-source
          git apply --recount --check "$env:PATCH_FILE"
          git apply --recount "$env:PATCH_FILE"
          git diff -- packages/tui/src/config/keybind.ts packages/tui/src/context/permission.tsx packages/tui/src/app.tsx packages/tui/src/component/prompt/index.tsx packages/tui/src/routes/session/index.tsx packages/tui/src/routes/session/permission.tsx packages/tui/src/component/spinner.tsx packages/opencode/src/cli/cmd/run/footer.subagent.tsx packages/opencode/src/cli/cmd/run/footer.view.tsx

      - name: Install dependencies
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true
          Set-Location opencode-source
          bun install

      - name: Typecheck patched OpenCode package
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true
          Set-Location opencode-source
          bun run --cwd packages/opencode typecheck

      - name: Build patched Windows OpenCode binary
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true
          Set-Location opencode-source
          bun run --cwd packages/opencode build --single --skip-embed-web-ui

      - name: Locate patched OpenCode binary
        id: locate
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true
          $candidates = Get-ChildItem -Path opencode-source\packages\opencode\dist -Recurse -File | Where-Object {
            $_.Name -eq 'opencode.exe'
          } | Sort-Object FullName
          $candidates | ForEach-Object { Write-Host "candidate=$($_.FullName)" }
          $preferred = $candidates | Where-Object { $_.FullName -match 'windows.*x64' } | Select-Object -First 1
          if (-not $preferred) { throw 'No Windows x64 opencode.exe found under packages/opencode/dist' }
          $out = Join-Path $env:GITHUB_WORKSPACE 'patched-opencode.exe'
          Copy-Item -LiteralPath $preferred.FullName -Destination $out -Force
          & $out --version
          "binary=$out" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Assemble offline install package
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true
          $pkg = Join-Path $env:GITHUB_WORKSPACE $env:PACKAGE_NAME
          $payload = Join-Path $pkg 'payload'
          $workspace = Join-Path $pkg 'workspace'
          New-Item -ItemType Directory -Force -Path $payload | Out-Null
          New-Item -ItemType Directory -Force -Path $workspace | Out-Null

          Copy-Item -LiteralPath '${{ steps.locate.outputs.binary }}' -Destination (Join-Path $payload 'opencode.exe') -Force
          Get-ChildItem -LiteralPath 'workspace-template' -Force | Copy-Item -Destination $workspace -Recurse -Force

          $workspaceDocs = Join-Path $workspace 'docs'
          $workspacePatches = Join-Path $workspace 'patches'
          New-Item -ItemType Directory -Force -Path $workspaceDocs | Out-Null
          New-Item -ItemType Directory -Force -Path $workspacePatches | Out-Null
          Get-ChildItem -LiteralPath 'docs' -Force | Copy-Item -Destination $workspaceDocs -Recurse -Force
          Get-ChildItem -LiteralPath 'patches' -Force | Copy-Item -Destination $workspacePatches -Recurse -Force

          @'
          @echo off
          setlocal EnableExtensions EnableDelayedExpansion
          set "ROOT=%USERPROFILE%\OpenCodeLIG"
          set "BIN=%ROOT%\bin"
          set "WS=%ROOT%\workspace"
          set "SUMS=%~dp0SHA256SUMS.txt"
          set "PAYLOAD_EXE=%~dp0payload\opencode.exe"
          echo.
          echo ============================================================
          echo LIG OpenCode patched offline installer
          echo ============================================================
          echo Target: %ROOT%
          echo.
          if not exist "%PAYLOAD_EXE%" (
            echo [ERROR] Missing payload\opencode.exe
            pause
            exit /b 1
          )
          if not exist "%SUMS%" (
            echo [ERROR] Missing SHA256SUMS.txt
            pause
            exit /b 1
          )
          set "EXPECTED="
          for /f "tokens=1,*" %%A in ('findstr /C:"payload/opencode.exe" "%SUMS%"') do set "EXPECTED=%%A"
          if not defined EXPECTED (
            echo [ERROR] payload/opencode.exe entry missing in SHA256SUMS.txt
            pause
            exit /b 1
          )
          set "ACTUAL="
          for /f "tokens=1" %%A in ('certutil -hashfile "%PAYLOAD_EXE%" SHA256 ^| findstr /R "^[0-9A-Fa-f][0-9A-Fa-f]*$"') do if not defined ACTUAL set "ACTUAL=%%A"
          if not defined ACTUAL (
            echo [ERROR] Failed to calculate payload checksum
            pause
            exit /b 1
          )
          if /I not "!EXPECTED!"=="!ACTUAL!" (
            echo [ERROR] payload/opencode.exe checksum mismatch
            echo Expected: !EXPECTED!
            echo Actual:   !ACTUAL!
            pause
            exit /b 1
          )
          if exist "%ROOT%" (
            set "BACKUP=%USERPROFILE%\OpenCodeLIG_backup_%RANDOM%"
            echo Existing installation found. Backing up to !BACKUP!
            robocopy "%ROOT%" "!BACKUP!" /E /NFL /NDL /NJH /NJS /NP >nul
            if errorlevel 8 (
              echo [ERROR] Existing installation backup failed
              pause
              exit /b 1
            )
          )
          if not exist "%BIN%" mkdir "%BIN%"
          if not exist "%WS%" mkdir "%WS%"
          copy /y "%PAYLOAD_EXE%" "%BIN%\opencode.exe" >nul
          if errorlevel 1 (
            echo [ERROR] Failed to copy opencode.exe
            pause
            exit /b 1
          )
          robocopy "%~dp0workspace" "%WS%" /E /NFL /NDL /NJH /NJS /NP >nul
          if errorlevel 8 (
            echo [ERROR] Workspace copy failed
            pause
            exit /b 1
          )
          rem Project-local opencode config: disable autoupdate so an offline
          rem PC never waits on update checks at startup.
          (
            echo {
            echo   "autoupdate": false
            echo }
          ) > "%WS%\opencode.json"
          rem Launcher hardening (past field fix for slow window open):
          rem kill leftover opencode processes, pin userdata/XDG paths, and
          rem block update/default-plugin network attempts before launch.
          (
            echo @echo off
            echo set "OCODE_EXE=%%USERPROFILE%%\OpenCodeLIG\bin\opencode.exe"
            echo set "AGENTOPS_HOME=%%USERPROFILE%%\OpenCodeLIG\workspace"
            echo set "OPENCODE_USERDATA=%%USERPROFILE%%\OpenCodeLIG\userdata"
            echo set "XDG_CONFIG_HOME=%%OPENCODE_USERDATA%%\config"
            echo set "XDG_DATA_HOME=%%OPENCODE_USERDATA%%\data"
            echo set "XDG_CACHE_HOME=%%OPENCODE_USERDATA%%\cache"
            echo set "OPENCODE_DISABLE_DEFAULT_PLUGINS=1"
            echo set "OPENCODE_PURE=1"
            echo set "NO_UPDATE_NOTIFIER=1"
            echo if not exist "%%OPENCODE_USERDATA%%" mkdir "%%OPENCODE_USERDATA%%"
            echo tasklist /FI "IMAGENAME eq opencode.exe" 2^>nul ^| find /I "opencode.exe" ^>nul ^&^& taskkill /F /IM opencode.exe ^>nul 2^>nul
            echo cd /d "%%AGENTOPS_HOME%%"
            echo "%%OCODE_EXE%%" %%*
          ) > "%WS%\RUN_OPENCODE_LIG.bat"
          (
            echo @echo off
            echo "%%USERPROFILE%%\OpenCodeLIG\bin\opencode.exe" --version
            echo if errorlevel 1 exit /b 1
            echo echo [OK] patched opencode.exe exists and runs.
          ) > "%WS%\VERIFY_OFFLINE_INSTALL.bat"
          echo.
          echo [OK] Installed.
          echo Run:
          echo   %WS%\RUN_OPENCODE_LIG.bat
          echo Verify:
          echo   %WS%\VERIFY_OFFLINE_INSTALL.bat
          echo Docs:
          echo   %WS%\docs\AI_HANDOFF.md
          echo.
          pause
          exit /b 0
          '@ | Set-Content -Path (Join-Path $pkg 'INSTALL_OFFLINE_LIG_OPENCODE.bat.txt') -Encoding ASCII

          @'
          # LIG OpenCode patched offline package

          This package contains a Windows OpenCode binary built from upstream OpenCode with the LIG permission approval controller patch applied.

          Install on the offline company PC:

          1. Download the `LIG_OPENCODE_PATCHED_OFFLINE_PACKAGE` artifact from GitHub Actions.
          2. Extract the downloaded artifact ZIP. The extracted folder should contain `payload`, `workspace`, `SHA256SUMS.txt`, and `INSTALL_OFFLINE_LIG_OPENCODE.bat.txt` directly.
          3. Rename `INSTALL_OFFLINE_LIG_OPENCODE.bat.txt` to `INSTALL_OFFLINE_LIG_OPENCODE.bat`.
          4. Run it.
          5. Start OpenCode with `%USERPROFILE%\OpenCodeLIG\workspace\RUN_OPENCODE_LIG.bat`.
          6. Verify with `%USERPROFILE%\OpenCodeLIG\workspace\VERIFY_OFFLINE_INSTALL.bat`.

          The installer checks the `payload/opencode.exe` SHA256 before copying files. If `%USERPROFILE%\OpenCodeLIG` already exists, it backs it up before overwriting.

          Permission approval control:

          - `Shift+Tab` toggles `[PERM:ASK]` / `[PERM:AUTO]`.
          - `Shift+F3` is the previous-agent shortcut.
          - `/permission status`, `/permission auto`, `/permission ask`, `/permission cycle`.
          - `/perm status`, `/perm auto`, `/perm ask`, `/perm cycle`.

          The installer uses local files only. It does not clone GitHub and does not use PowerShell execution-policy bypass.
          '@ | Set-Content -Path (Join-Path $pkg 'README_OFFLINE_INSTALL.md') -Encoding UTF8

          $hashes = @()
          Get-ChildItem -Path $pkg -Recurse -File -Force | Sort-Object FullName | ForEach-Object {
            $rel = $_.FullName.Substring($pkg.Length + 1).Replace('\','/')
            $hash = (Get-FileHash -LiteralPath $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            $hashes += "$hash  $rel"
          }
          $hashes | Set-Content -Path (Join-Path $pkg 'SHA256SUMS.txt') -Encoding ASCII

      - name: Verify offline package contents
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true
          $check = Join-Path $env:GITHUB_WORKSPACE $env:PACKAGE_NAME
          if (-not (Test-Path -LiteralPath $check)) { throw "Package directory not found: $check" }
          $required = @(
            'INSTALL_OFFLINE_LIG_OPENCODE.bat.txt',
            'README_OFFLINE_INSTALL.md',
            'SHA256SUMS.txt',
            'payload\opencode.exe',
            'workspace\.gitignore',
            'workspace\.opencode\commands\permission.md',
            'workspace\.opencode\commands\agentmode.md',
            'workspace\.opencode\agents\agentops-supervisor.md',
            'workspace\agent_ops\agentops.py',
            'workspace\docs\AI_HANDOFF.md',
            'workspace\patches\opencode-permission-mode-toggle.patch'
          )
          foreach ($item in $required) {
            $path = Join-Path $check $item
            if (-not (Test-Path -LiteralPath $path)) { throw "Required package file missing: $item" }
          }
          Get-ChildItem -Path $check -Recurse -File -Force | ForEach-Object {
            Write-Host $_.FullName.Substring($check.Length + 1).Replace('\','/')
          }
          $sumFile = Join-Path $check 'SHA256SUMS.txt'
          foreach ($line in Get-Content -LiteralPath $sumFile) {
            if ([string]::IsNullOrWhiteSpace($line)) { continue }
            $parts = $line -split '\s+', 2
            if ($parts.Count -ne 2 -or $parts[0] -notmatch '^[a-f0-9]{64}$') { throw "Malformed SHA256SUMS line: $line" }
            $relative = $parts[1].Replace('/', '\')
            $target = Join-Path $check $relative
            if (-not (Test-Path -LiteralPath $target)) { throw "SHA256SUMS target missing: $($parts[1])" }
            $actual = (Get-FileHash -LiteralPath $target -Algorithm SHA256).Hash.ToLowerInvariant()
            if ($actual -ne $parts[0]) { throw "SHA256 mismatch for $($parts[1])" }
          }
          $exe = Join-Path $check 'payload\opencode.exe'
          & $exe --version

      - name: Upload offline package artifact
        uses: actions/upload-artifact@v4
        with:
          name: LIG_OPENCODE_PATCHED_OFFLINE_PACKAGE
          path: LIG_OPENCODE_PATCHED_OFFLINE_PACKAGE
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 30
